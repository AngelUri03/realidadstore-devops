apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: realidadstore
  namespace: argocd
  labels:
    app.kubernetes.io/name: realidadstore
    app.kubernetes.io/component: continuous-delivery
spec:
  project: default

  source:
    repoURL: https://github.com/AngelUri03/realidadstore-devops.git
    targetRevision: main
    path: k8s/app
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: realidadstore

  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: backend
      namespace: realidadstore
      jsonPointers:
        - /spec/replicas

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - RespectIgnoreDifferences=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
