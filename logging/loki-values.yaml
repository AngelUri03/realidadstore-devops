deploymentMode: Monolithic

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 1

  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  storage:
    type: filesystem
    filesystem:
      chunks_directory: /var/loki/chunks
      rules_directory: /var/loki/rules

  limits_config:
    allow_structured_metadata: true
    volume_enabled: true

singleBinary:
  replicas: 1

  persistence:
    enabled: true
    storageClass: nfs-csi
    accessModes:
      - ReadWriteOnce
    size: 5Gi
    whenDeleted: Retain
    whenScaled: Retain

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

gateway:
  enabled: true

  nginxConfig:
    enableIPv6: false

  resources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

# Para el laboratorio evitamos pods extra y consumo innecesario.
chunksCache:
  enabled: false

resultsCache:
  enabled: false

lokiCanary:
  enabled: false

minio:
  enabled: false

# Desactivar componentes de los otros modos de despliegue.
backend:
  replicas: 0

read:
  replicas: 0

write:
  replicas: 0

ingester:
  replicas: 0

querier:
  replicas: 0

queryFrontend:
  replicas: 0

queryScheduler:
  replicas: 0

distributor:
  replicas: 0

compactor:
  replicas: 0

indexGateway:
  replicas: 0

bloomPlanner:
  replicas: 0

bloomBuilder:
  replicas: 0

bloomGateway:
  replicas: 0

# Desactivamos la prueba Helm porque Loki Canary está deshabilitado.
test:
  enabled: false
