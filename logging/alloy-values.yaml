controller:
  type: deployment
  replicas: 1

rbac:
  create: true

serviceAccount:
  create: true

alloy:
  enableReporting: false

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

  configMap:
    create: true
    content: |-
      logging {
        level  = "info"
        format = "logfmt"
      }

      // Descubre todos los pods visibles mediante la API de Kubernetes.
      discovery.kubernetes "pods" {
        role = "pod"
      }

      // Conserva únicamente pods del namespace realidadstore
      // y transforma metadatos de Kubernetes en labels de Loki.
      discovery.relabel "realidadstore_logs" {
        targets = discovery.kubernetes.pods.targets

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "keep"
          regex         = "realidadstore"
        }

        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          action        = "replace"
          target_label  = "namespace"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          action        = "replace"
          target_label  = "pod"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_container_name"]
          action        = "replace"
          target_label  = "container"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_node_name"]
          action        = "replace"
          target_label  = "node"
        }

        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          action        = "replace"
          target_label  = "app"
        }

        rule {
          source_labels = [
            "__meta_kubernetes_namespace",
            "__meta_kubernetes_pod_container_name",
          ]
          action       = "replace"
          target_label = "job"
          separator    = "/"
          replacement  = "$1"
        }

        rule {
          source_labels = [
            "__meta_kubernetes_pod_container_id",
          ]
          action       = "replace"
          target_label = "container_runtime"
          regex        = `^(\S+):\/\/.+$`
          replacement  = "$1"
        }
      }

      // Obtiene stdout y stderr de los contenedores mediante Kubernetes.
      loki.source.kubernetes "realidadstore" {
        targets    = discovery.relabel.realidadstore_logs.output
        forward_to = [loki.process.realidadstore.receiver]
      }

      // Agrega labels estáticos de bajo cardinalidad.
      loki.process "realidadstore" {
        stage.static_labels {
          values = {
            cluster     = "realidadstore-k8s",
            environment = "laboratorio",
          }
        }

        forward_to = [loki.write.local.receiver]
      }

      // Envía los logs al Loki instalado en el namespace logging.
      loki.write "local" {
        endpoint {
          url = "http://loki-gateway.logging.svc.cluster.local/loki/api/v1/push"
        }
      }
