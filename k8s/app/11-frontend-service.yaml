apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: realidadstore
  labels:
    app: frontend
    app.kubernetes.io/name: realidadstore
    app.kubernetes.io/component: frontend
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
