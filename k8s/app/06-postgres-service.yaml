apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: realidadstore
  labels:
    app: postgres
    app.kubernetes.io/name: realidadstore
    app.kubernetes.io/component: database
spec:
  clusterIP: None
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
